name: Android CI (ARM32)

on:
  push:
    branches: [ "master", "feature/*" ]
  workflow_dispatch: # Bu satır "Actions" sekmesinde "Run workflow" butonunu çıkarır

jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
    
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Write key
        env:
          KEY_STORE: ${{ secrets.KEY_STORE }}
        run: |
          if [ ! -z "$KEY_STORE" ]; then
            echo androidStorePassword='${{ secrets.KEY_STORE_PASSWORD }}' >> gradle.properties
            echo androidKeyAlias='${{ secrets.ALIAS }}' >> gradle.properties
            echo androidKeyPassword='${{ secrets.KEY_PASSWORD }}' >> gradle.properties
            echo androidStoreFile='key.jks' >> gradle.properties
            echo "$KEY_STORE" | base64 --decode > key.jks
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build ARM32
        run: |
          ./gradlew assembleWhatsappDebug assembleBusinessDebug -Pminify=true -Pandroid.ndk.abiFilters=armeabi-v7a

      - name: Get short SHA
        run: echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: WaEnhancer ARM32 ${{ env.SHORT_SHA }}
          files: |
            app/build/outputs/apk/whatsapp/debug/*.apk
            app/build/outputs/apk/business/debug/*.apk
          tag_name: arm32-${{ env.SHORT_SHA }}
          
