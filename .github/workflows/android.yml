name: Android CI (ARM32)

on:
  push:
    branches: [ "master", "feature/*" ]

jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, 'Merge')
    
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive' # Eğer LSPosed API veya diğer kütüphaneler submodule ise gerekli

      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Write key
        if: github.event_name != 'pull_request'
        env:
          KEY_STORE: ${{ secrets.KEY_STORE }}
        run: |
          if [ ! -z "$KEY_STORE" ]; then
            echo androidStorePassword='${{ secrets.KEY_STORE_PASSWORD }}' >> gradle.properties
            echo androidKeyAlias='${{ secrets.ALIAS }}' >> gradle.properties
            echo androidKeyPassword='${{ secrets.KEY_PASSWORD }}' >> gradle.properties
            echo androidStoreFile='key.jks' >> gradle.properties
            echo "$KEY_STORE" | base64 --decode > key.jks
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build ARM32 Variants
        # -Pandroid.bundle.enableUncompressedNativeLibs=false opsiyoneldir
        # abiFilters ile sadece arm32 (armeabi-v7a) derlemesini zorluyoruz
        run: |
          ./gradlew assembleWhatsappDebug assembleBusinessDebug \
            -Pminify=true \
            -Pandroid.ndk.abiFilters=armeabi-v7a

      - name: Get short SHA
        run: echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: WaEnhancer-ARM32-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/*/debug/*.apk

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: WaEnhancer ARM32 ${{ env.SHORT_SHA }}
          body_path: changelog.txt
          files: |
            app/build/outputs/apk/whatsapp/debug/app-whatsapp-debug.apk
            app/build/outputs/apk/business/debug/app-business-debug.apk
          tag_name: arm32-${{ env.SHORT_SHA }}

      - name: Read changelog
        if: ${{ success() && github.ref == 'refs/heads/master' && env.BOT_TOKEN != '' }}
        id: changelog
        run: |
          content=$(cat changelog.txt || echo "No changelog provided")
          echo "content=$content" >> $GITHUB_OUTPUT

      - name: Post to Telegram channel
        if: ${{ success() && github.ref == 'refs/heads/master' && env.BOT_TOKEN != '' }}
        uses: Dev4Mod/telegram-github-action@master
        with:
          to: ${{ env.CHANNEL_ID }}
          token: ${{ env.BOT_TOKEN }}
          format: markdown
          message: |
            *WaEnhancer ARM32 Build*
            
            ${{ steps.changelog.outputs.content }}

            Release: https://github.com/${{ github.repository }}/releases/tag/arm32-${{ env.SHORT_SHA }}
            
